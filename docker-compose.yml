services:
  # Backend Service (.NET API)
  ai-be:
    build:
      context: ./AI-BE
      dockerfile: Dockerfile
    container_name: ai-comsign-backend
    restart: always
    environment:
      # Supabase Connection String (Transaction Pooler port 6543 recommended, or Session port 5432)
      # Format: "Host=aws-0-us-east-1.pooler.supabase.com;Port=6543;Database=postgres;Username=...;Password=..."
      ConnectionStrings__DefaultConnection: "${SUPABASE_CONNECTION_STRING}"
      # JWT signing key. MUST be set in the host environment (e.g. .env file).
      # Override JWT_SECRET in production; the default below is a dev-only fallback.
      JwtSettings__Key: ${JWT_SECRET:-dev-only-change-me-in-production-this-is-not-secure-32+chars}
      JwtSettings__Issuer: "AI-ComSign"
      JwtSettings__Audience: "AI-ComSign"
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    networks:
      - app_network
    ports:
      - "9090:8080"

  # Frontend Service (React + Caddy)
  ai-sign:
    build:
      context: ./AI-sign
      dockerfile: Dockerfile
    container_name: ai-comsign-frontend
    restart: always
    ports:
      # Expose container port 80 to host port 3000
      # Your system-wide cloudflared will point to http://localhost:3000
      - "3000:80"
    depends_on:
      - ai-be
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
